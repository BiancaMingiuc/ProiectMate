<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matematica pentru toti</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="menu-icon" onclick="toggleSidebar()">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div id="sidebar" class="sidebar">
        <a href="javascript:void(0)" class="closebtn" onclick="toggleSidebar()">&times;</a>
        <div class="sidebar-content">
            <h2>Meniu</h2>
            <hr>
            <button onclick="switchCategory('arcade')">Games 🎮</button>
            <button onclick="afiseazaStatistici()">Stats 📈</button>
            <button onclick="location.reload()">Home 🏠</button>

            <div id="zona-statistici" style="display:none; margin-top: 20px;">
                <h3 style="color: white; font-size: 1rem;">Istoric Sesiuni</h3>
                <table id="tabel-stats" style="width: 100%; color: white; border-collapse: collapse; font-size: 0.8rem;">
                    <thead>
                        <tr style="border-bottom: 1px solid #555;">
                            <th>Ora</th>
                            <th>Tip</th>
                            <th>✅</th>
                            <th>❌</th>
                        </tr>
                    </thead>
                    <tbody id="istoric-body"></tbody>
                </table>
                <button onclick="stergeIstoric()" style="background: none; border: 1px solid red; color: red; margin-top: 10px; font-size: 0.7rem;">Golește</button>
            </div>
        </div>
    </div>

    <div class="header header-container">
        <h1>Academia de Mate</h1>
    </div>

    <div class="subtitle-container">
        <p class="subtitle">Alege misiunea ta de astăzi:</p>
    </div>

    <div class="meniu-principal">
        <button class="card adunare" onclick="startJoc('adunare')">Adunări<span>➕</span></button>
        <button class="card scadere" onclick="startJoc('scadere')">Scăderi<span>➖</span></button>
        <button class="card inmultire" onclick="startJoc('inmultire')">Înmulțiri<span>✖️</span></button>
        <button class="card impartire" onclick="startJoc('impartire')">Împărțiri<span>➗</span></button>
    </div>

    <div id="zona-exercitiu" style="display:none;">
        <div class="scor-container">
            ✅ Corecte: <span id="scor-corecte">0</span> | 
            ❌ Greșite: <span id="scor-gresite">0</span>
        </div>
        
        <h2 id="operatie-titlu">Misiune activa</h2>
        
        <div class="display-calcul">
            <span id="num1">0</span> 
            <span id="operator">+</span> 
            <span id="num2">0</span> = 
            <input type="number" id="raspuns">
        </div>

        <div class="control-joc">
            <button onclick="verifica()" class="btn-trimite">Verifică!</button>
            <button onclick="finalizeazaSesiunea()" class="btn-stop">Încheie Sesiunea</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
